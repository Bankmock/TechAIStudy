  <script>


// Function to handle form submission
function submitForm() {
  const input = document.getElementById('video-url');
  const url = input.value.trim();

  if(!url) return alert("Enter URL");
  window.location.href = "download.html?url=" + encodeURIComponent(url);

  return true; // Allow form submission
}

// Function to paste URL from clipboard
async function pasteUrlOnly() {
  const input = document.getElementById('video-url');

  try {
    const text = await navigator.clipboard.readText();
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const match = text.match(urlRegex);

    if (match && match.length > 0) {
      input.value = match[0];
    } else {
      alert('No valid URL found in clipboard.');
    }
  } catch (err) {
    alert("Failed to access clipboard. Please paste manually.\nError: " + err);
  }

  updateInputActionButton();
}

// Function to clear input field
function clearInput() {
  const input = document.getElementById('video-url');
  input.value = "";
  updateInputActionButton();
}

// Function to update the action button (Paste/Clear)
function updateInputActionButton() {
  const input = document.getElementById('video-url');
  const actionBtn = document.getElementById('inputActionBtn');

  if (input.value.trim() === "") {
    actionBtn.innerHTML = '<strong>&#128203; Paste</strong>';
    actionBtn.className = 'paste-btn';
    actionBtn.onclick = pasteUrlOnly;
  } else {
    actionBtn.innerHTML = '<strong>&#10060; Clear</strong>';
    actionBtn.className = 'clear-btn';
    actionBtn.onclick = clearInput;
  }
}

// Initialize event listeners
document.addEventListener('DOMContentLoaded', function() {
  const input = document.getElementById('video-url');

  // Update button on input change
  input.addEventListener('input', updateInputActionButton);

  // Initial button setup
  updateInputActionButton();
});
</script>
