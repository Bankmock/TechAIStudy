<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download Video</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: #fff;
  padding: 50px;
}
video {
  width: 300px;
  margin-top: 20px;
}
button {
  padding: 10px 20px;
  font-size: 16px;
  margin-top: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Downloading...</h1>

<div id="result"></div>

<script>

// Get URL from query params
function getUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("url");
}

// Auto run on load
window.onload = async function () {
  let url = getUrl();

  if (!url) {
    document.getElementById("result").innerHTML = "No URL provided ❌";
    return;
  }

  fetchVideo(url);
};

async function fetchVideo(url) {
  document.getElementById("result").innerHTML = "Loading video... ⏳";

  let api = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;

  try {
    let res = await fetch(api);
    let data = await res.json();

    if (data.code !== 0) {
      document.getElementById("result").innerHTML = "Invalid TikTok URL ❌";
      return;
    }

    let videoUrl = data.data.play;
    let title = data.data.title;

    document.getElementById("result").innerHTML = `
      <h3>${title}</h3>
      <video src="${videoUrl}" controls></video><br>
      <button onclick="downloadVideo('${videoUrl}')">Download Video</button>
    `;

  } catch (err) {
    console.error(err);
    document.getElementById("result").innerHTML = "Error loading video ❌";
  }
}

// Download function
async function downloadVideo(url) {
  try {
    let response = await fetch(url);
    let blob = await response.blob();

    let blobUrl = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = blobUrl;
    a.download = "tiktok-video.mp4";
    document.body.appendChild(a);
    a.click();

    a.remove();
    window.URL.revokeObjectURL(blobUrl);

  } catch (err) {
    alert("Download failed ❌");
    console.error(err);
  }
}

</script>

</body>
</html>
