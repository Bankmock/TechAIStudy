<script>

// Get URL from query
function getUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("url");
}

// Auto run
window.onload = function () {
  let url = getUrl();

  if (!url) {
    showError("No URL provided ❌");
    return;
  }

  fetchVideo(url);
};

// Fetch video
async function fetchVideo(url) {
  let api = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;

  try {
    let res = await fetch(api);
    let data = await res.json();

    if (data.code !== 0) {
      showError("Invalid TikTok link ❌");
      return;
    }

    let videoUrl = data.data.play;
    let title = data.data.title || "TikTok Video";

    document.getElementById("result").innerHTML = `
      <h3>${title}</h3>
      <video src="${videoUrl}" controls></video>
      <button onclick="downloadVideo('${videoUrl}')">⬇ Download Video</button>
    `;

  } catch (err) {
    console.error(err);
    showError("Failed to load video ❌");
  }
}

// Download
async function downloadVideo(url) {
  try {
    let response = await fetch(url);
    let blob = await response.blob();

    let blobUrl = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = blobUrl;
    a.download = "tiktok-video.mp4";
    document.body.appendChild(a);
    a.click();

    a.remove();
    URL.revokeObjectURL(blobUrl);

  } catch (err) {
    alert("Download failed ❌");
  }
}

// Error UI
function showError(msg) {
  document.getElementById("result").innerHTML = `
    <p style="color:red; margin-top:20px;">${msg}</p>
  `;
}

</script>
